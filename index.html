<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>다국어 산성비 게임 Pro - 100% 실시간 API 버전</title>
    <link rel="manifest" href="./manifest.json">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #F5F7FA; user-select: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function LanguageRainGame() {
          const [lang, setLang] = useState('KO');
          const [level, setLevel] = useState(() => Number(localStorage.getItem('rain_game_lvl')) || 1);
          const [exp, setExp] = useState(() => Number(localStorage.getItem('rain_game_exp')) || 0);
          const [score, setScore] = useState(0);
          const [isPlaying, setIsPlaying] = useState(false);
          const [isLoading, setIsLoading] = useState(false);
          const [fallingWords, setFallingWords] = useState([]);
          const [inputValue, setInputValue] = useState('');
          const [hp, setHp] = useState(5);

          const wordBufferRef = useRef([]);
          const loopRef = useRef(null);
          const spawnRef = useRef(null);
          const expToNextLevel = level * 100;

          useEffect(() => {
            localStorage.setItem('rain_game_lvl', level);
            localStorage.setItem('rain_game_exp', exp);
          }, [level, exp]);

          // 고도화: 4개 언어 모두 외부 실시간 API 연동 가동
          const fetchRandomWords = async (targetLang) => {
            setIsLoading(true);
            try {
              if (targetLang === 'EN') {
                const res = await fetch('https://random-word-api.herokuapp.com/word?number=40');
                const data = await res.json();
                return data.filter(w => w.length >= 3 && w.length <= 8);
              } 
              
              if (targetLang === 'ES') {
                const res = await fetch('https://random-word-api.herokuapp.com/word?lang=es&number=40');
                const data = await res.json();
                return data.filter(w => w.length >= 3 && w.length <= 8);
              }

              if (targetLang === 'KO') {
                // 다국어 오픈 사전 데이터셋(자유 우회 경로)을 활용한 무작위 명사 파싱
                const res = await fetch('https://raw.githubusercontent.com/swor0511/Korean-Words-Link/main/words.json');
                const data = await res.json();
                // 2글자~5글자 사이의 순수 한국어 단어만 무작위 30개 추출
                const filtered = data.filter(w => w.length >= 2 && w.length <= 5 && /^[가-힣]+$/.test(w));
                return filtered.sort(() => Math.random() - 0.5).slice(0, 30);
              }

              if (targetLang === 'JA') {
                // 오픈소스 일본어 기초 어휘 및 가나 전용 데이터셋 연동
                const res = await fetch('https://raw.githubusercontent.com/motoki317/00_basetopt_words/main/japanese_words.json');
                const data = await res.json(); // 히라가나/가타카나 기반의 배열 구조 데이터
                // 모바일 레이아웃에 적합한 2~5글자 사이 가나 단어 무작위 30개 추출
                const filtered = data.filter(w => w.length >= 2 && w.length <= 5 && /^[ぁ-んァ-ヶ]+$/.test(w));
                return filtered.sort(() => Math.random() - 0.5).slice(0, 30);
              }

            } catch (error) {
              console.error(`${targetLang} API 호출 오류 발생 - 임시 복구 모드로 전환`, error);
              // 네트워크 지연/에러 시 게임 멈춤 방지용 백업 폴백 데이터
              const fallbacks = { KO: ['사과', '하늘', '바다'], JA: ['ねこ', 'さくら', 'みず'], EN: ['test', 'word', 'game'], ES: ['casa', 'gato', 'sol'] };
              return fallbacks[targetLang];
            } finally {
              setIsLoading(false);
            }
          };

          const startGame = async () => {
            setIsPlaying(false);
            wordBufferRef.current = await fetchRandomWords(lang);
            setFallingWords([]);
            setScore(0);
            setHp(5);
            setIsPlaying(true);
            setInputValue('');
          };

          const gameOver = () => {
            setIsPlaying(false);
            alert(`게임 오버! 최종 점수: ${score}`);
          };

          useEffect(() => {
            if (!isPlaying) return;

            const spawnWord = async () => {
              if (wordBufferRef.current.length < 5 && !isLoading) {
                const freshWords = await fetchRandomWords(lang);
                wordBufferRef.current = [...wordBufferRef.current, ...freshWords];
              }

              if (wordBufferRef.current.length === 0) return;

              const nextWord = wordBufferRef.current.shift();
              const randomX = Math.floor(Math.random() * 70) + 15; // 좌우 마진 확보

              setFallingWords((prev) => [
                ...prev,
                { id: Date.now() + Math.random(), text: nextWord, x: randomX, y: 0 }
              ]);
            };

            const spawnInterval = Math.max(800, 3200 - level * 250);
            spawnRef.current = setInterval(spawnWord, spawnInterval);

            return () => clearInterval(spawnRef.current);
          }, [isPlaying, lang, level, isLoading]);

          useEffect(() => {
            if (!isPlaying) return;

            const updatePosition = () => {
              setFallingWords((prev) => {
                const nextWords = prev.map((w) => ({ ...w, y: w.y + (0.35 + level * 0.08) }));
                const escaped = nextWords.filter((w) => w.y >= 92);
                if (escaped.length > 0) {
                  setHp((currHp) => {
                    const updatedHp = currHp - escaped.length;
                    if (updatedHp <= 0) {
                      gameOver();
                      return 0;
                    }
                    return updatedHp;
                  });
                }
                return nextWords.filter((w) => w.y < 92);
              });
              loopRef.current = requestAnimationFrame(updatePosition);
            };

            loopRef.current = requestAnimationFrame(updatePosition);
            return () => cancelAnimationFrame(loopRef.current);
          }, [isPlaying, level]);

          const handleKeyDown = (e) => {
            if (e.key === 'Enter') {
              if (e.nativeEvent.isComposing) return;

              const trimmedInput = inputValue.trim();
              // 영어/스페인어는 대소문자 무시 비교 처리
              const isMatch = (wText) => (lang === 'EN' || lang === 'ES') 
                ? wText.toLowerCase() === trimmedInput.toLowerCase() 
                : wText === trimmedInput;

              const targetIndex = fallingWords.findIndex((w) => isMatch(w.text));

              if (targetIndex !== -1) {
                setFallingWords((prev) => prev.filter((_, idx) => idx !== targetIndex));
                setScore((prev) => prev + 10);
                setExp((prevExp) => {
                  let newExp = prevExp + 30; // 100% 라이브 외부 사전 반영 보너스 경험치
                  if (newExp >= expToNextLevel) {
                    newExp -= expToNextLevel;
                    setLevel((lvl) => lvl + 1);
                  }
                  return newExp;
                });
              }
              setInputValue('');
            }
          };

          return (
            <div style={styles.container}>
              <div style={styles.header}>
                <div>Lv. {level}</div>
                <div style={styles.expBarContainer}>
                  <div style={{ ...styles.expBar, width: `${(exp / expToNextLevel) * 100}%` }} />
                </div>
                <div>HP: {'❤️'.repeat(hp)}</div>
                <div>Score: {score}</div>
              </div>

              <div style={styles.langTabs}>
                {['KO', 'EN', 'JA', 'ES'].map((l) => (
                  <button
                    key={l}
                    onClick={() => { setLang(l); setIsPlaying(false); setFallingWords([]); }}
                    style={{ ...styles.tabButton, backgroundColor: lang === l ? '#4A90E2' : '#E0E0E0' }}
                  >
                    {l}
                  </button>
                ))}
              </div>

              <div style={styles.gameArea}>
                {!isPlaying && (
                  <div style={styles.centerOverlay}>
                    <button onClick={startGame} disabled={isLoading} style={styles.startButton}>
                      {isLoading ? "라이브 사전 로딩 중..." : `${lang} 사전 모드 시작`}
                    </button>
                  </div>
                )}
                {fallingWords.map((word) => (
                  <div key={word.id} style={{ ...styles.word, left: `${word.x}%`, top: `${word.y}%` }}>
                    <div style={styles.wordText}>{word.text}</div>
                  </div>
                ))}
              </div>

              <div style={styles.inputArea}>
                <input
                  type="text"
                  value={inputValue}
                  onChange={(e) => setInputValue(e.target.value)}
                  onKeyDown={handleKeyDown}
                  placeholder={isPlaying ? "사전 라이브 단어 입력!" : "언어 선택 후 시작을 누르세요"}
                  disabled={!isPlaying}
                  style={styles.input}
                />
              </div>
            </div>
          );
        }

        const styles = {
          container: { display: 'flex', flexDirection: 'column', width: '100vw', height: '100dvh', fontFamily: 'sans-serif', overflow: 'hidden' },
          header: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px', backgroundColor: '#2C3E50', color: '#FFF', fontSize: '14px' },
          expBarContainer: { width: '30%', height: '8px', backgroundColor: '#34495E', borderRadius: '4px', overflow: 'hidden' },
          expBar: { height: '100%', backgroundColor: '#2ECC71', transition: 'width 0.2s ease' },
          langTabs: { display: 'flex', justifyContent: 'space-around', padding: '10px', backgroundColor: '#FFF', borderBottom: '1px solid #E2E8F0' },
          tabButton: { padding: '8px 18px', border: 'none', borderRadius: '20px', color: '#FFF', fontWeight: 'bold', fontSize: '14px', cursor: 'pointer' },
          gameArea: { flex: 1, position: 'relative', backgroundColor: '#EDF2F7', overflow: 'hidden' },
          centerOverlay: { position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%, -50%)', zIndex: 10 },
          startButton: { padding: '18px 45px', fontSize: '20px', backgroundColor: '#4A90E2', color: 'white', border: 'none', borderRadius: '50px', fontWeight: 'bold', boxShadow: '0 10px 20px rgba(74,144,226,0.4)', cursor: 'pointer' },
          word: { position: 'absolute', padding: '8px 16px', backgroundColor: '#FFF', border: '1px solid #CBD5E0', borderRadius: '20px', transform: 'translateX(-50%)', boxShadow: '0 4px 8px rgba(0,0,0,0.06)' },
          wordText: { fontSize: '16px', fontWeight: 'bold', color: '#2D3748', whiteSpace: 'nowrap' },
          inputArea: { padding: '15px', backgroundColor: '#FFF', borderTop: '1px solid #E2E8F0' },
          input: { width: '100%', padding: '14px', fontSize: '16px', borderRadius: '8px', border: '2px solid #CBD5E0', outline: 'none', textAlign: 'center', boxSizing: 'border-box' }
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LanguageRainGame />);
    </script>
</body>
</html>
