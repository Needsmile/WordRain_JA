<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>다국어 산성비 게임 Pro - 완전판</title>
    <link rel="manifest" href="./manifest.json">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #F5F7FA; user-select: none; }
        /* 카운트다운 애니메이션 효과 */
        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }
        .countdown-text {
            font-size: 80px;
            font-weight: bold;
            color: #E74C3C;
            animation: pop 1s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 고성능 무작위 셔플 알고리즘 (단어 다양성 보장)
        function fisherYatesShuffle(array) {
          const result = [...array];
          for (let i = result.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [result[i], result[j]] = [result[j], result[i]];
          }
          return result;
        }

        function LanguageRainGame() {
          const [lang, setLang] = useState('KO');
          const [level, setLevel] = useState(() => Number(localStorage.getItem('rain_game_lvl')) || 1);
          const [exp, setExp] = useState(() => Number(localStorage.getItem('rain_game_exp')) || 0);
          const [score, setScore] = useState(0);
          const [isPlaying, setIsPlaying] = useState(false);
          const [isLoading, setIsLoading] = useState(false);
          const [countdown, setCountdown] = useState(null); // 카운트다운 상태 (null, 3, 2, 1, 'START!')
          const [isFullscreen, setIsFullscreen] = useState(false);
          const [fallingWords, setFallingWords] = useState([]);
          const [inputValue, setInputValue] = useState('');
          const [hp, setHp] = useState(5);

          const wordBufferRef = useRef([]);
          const loopRef = useRef(null);
          const spawnRef = useRef(null);
          const containerRef = useRef(null);
          const expToNextLevel = level * 100;

          useEffect(() => {
            localStorage.setItem('rain_game_lvl', level);
            localStorage.setItem('rain_game_exp', exp);
          }, [level, exp]);

          // 전체화면 변경 이벤트 감지 리스너
          useEffect(() => {
            const handleFullscreenChange = () => {
              setIsFullscreen(!!document.fullscreenElement);
            };
            document.addEventListener('fullscreenchange', handleFullscreenChange);
            return () => document.removeEventListener('fullscreenchange', handleFullscreenChange);
          }, []);

          // 전체화면 토글 함수
          const toggleFullscreen = () => {
            if (!document.fullscreenElement) {
              document.documentElement.requestFullscreen().catch((err) => {
                alert(`전체화면 모드를 활성화할 수 없습니다: ${err.message}`);
              });
            } else {
              document.exitFullscreen();
            }
          };

          // 실시간 API 데이터 가져오기 및 셔플 정제
          const fetchRandomWords = async (targetLang) => {
            setIsLoading(true);
            try {
              if (targetLang === 'EN') {
                const res = await fetch('https://random-word-api.herokuapp.com/word?number=50');
                const data = await res.json();
                return fisherYatesShuffle(data.filter(w => w.length >= 3 && w.length <= 8));
              } 
              
              if (targetLang === 'ES') {
                const res = await fetch('https://random-word-api.herokuapp.com/word?lang=es&number=50');
                const data = await res.json();
                return fisherYatesShuffle(data.filter(w => w.length >= 3 && w.length <= 8));
              }

              if (targetLang === 'KO') {
                const res = await fetch('https://raw.githubusercontent.com/swor0511/Korean-Words-Link/main/words.json');
                const data = await res.json();
                const filtered = data.filter(w => w.length >= 2 && w.length <= 5 && /^[가-힣]+$/.test(w));
                return fisherYatesShuffle(filtered).slice(0, 40);
              }

              if (targetLang === 'JA') {
                const res = await fetch('https://raw.githubusercontent.com/motoki317/00_basetopt_words/main/japanese_words.json');
                const data = await res.json();
                const filtered = data.filter(w => w.length >= 2 && w.length <= 5 && /^[ぁ-んァ-ヶ]+$/.test(w));
                return fisherYatesShuffle(filtered).slice(0, 40);
              }
            } catch (error) {
              console.error(`${targetLang} API 로드 실패 - 폴백 가동`, error);
              const fallbacks = { 
                KO: ['호수', '나무', '구름', '과자', '여우', '기차', '정원', '노트', '시계', '노래'], 
                JA: ['ねこ', 'いぬ', 'さくら', 'みず', 'とり', 'すし', 'あめ', 'うみ', 'やま', '하나'], 
                EN: ['apple', 'cloud', 'ocean', 'train', 'clock', 'music', 'sweet', 'house', 'plant', 'bread'], 
                ES: ['casa', 'gato', 'perro', 'agua', 'sol', 'luna', 'flor', 'arbol', 'libro', 'mesa'] 
              };
              return fisherYatesShuffle(fallbacks[targetLang]);
            } finally {
              setIsLoading(false);
            }
          };

          // 게임 시작 절차 (카운트다운 기능 포함)
          const startCountdownProcedure = async () => {
            setIsPlaying(false);
            setFallingWords([]);
            setScore(0);
            setHp(5);
            setInputValue('');
            
            // 사전 데이터 미리 받아오기
            wordBufferRef.current = await fetchRandomWords(lang);
            
            // 3초 카운트다운 시작
            let count = 3;
            setCountdown(count);

            const timer = setInterval(() => {
              count -= 1;
              if (count === 0) {
                setCountdown('START!');
              } else if (count < 0) {
                clearInterval(timer);
                setCountdown(null);
                setIsPlaying(true); // 카운트다운 종료 후 실제 게임 루프 가동
              } else {
                setCountdown(count);
              }
            }, 1000);
          };

          const gameOver = () => {
            setIsPlaying(false);
            alert(`게임 오버! 최종 점수: ${score}`);
          };

          // 단어 스폰 루프 (속도 조절 가동: 1단계는 매우 여유롭게)
          useEffect(() => {
            if (!isPlaying) return;

            const spawnWord = async () => {
              if (wordBufferRef.current.length < 5 && !isLoading) {
                const freshWords = await fetchRandomWords(lang);
                wordBufferRef.current = [...wordBufferRef.current, ...freshWords];
              }

              if (wordBufferRef.current.length === 0) return;

              const nextWord = wordBufferRef.current.shift();
              const randomX = Math.floor(Math.random() * 70) + 15;

              setFallingWords((prev) => [
                ...prev,
                { id: Date.now() + Math.random(), text: nextWord, x: randomX, y: 0 }
              ]);
            };

            // 초반 스폰 주기를 대폭 늘림 (Level 1 기준 4.5초에 한 개씩)
            const spawnInterval = Math.max(1000, 4500 - level * 400);
            spawnRef.current = setInterval(spawnWord, spawnInterval);

            return () => clearInterval(spawnRef.current);
          }, [isPlaying, lang, level, isLoading]);

          // 단어 하강 프레임 루프 (속도 하향 조정 완료)
          useEffect(() => {
            if (!isPlaying) return;

            const updatePosition = () => {
              setFallingWords((prev) => {
                // 초반 낙하 속도를 대폭 감소시킴 (0.35 -> 0.12)
                const nextWords = prev.map((w) => ({ ...w, y: w.y + (0.12 + level * 0.04) }));
                const escaped = nextWords.filter((w) => w.y >= 92);
                if (escaped.length > 0) {
                  setHp((currHp) => {
                    const updatedHp = currHp - escaped.length;
                    if (updatedHp <= 0) {
                      gameOver();
                      return 0;
                    }
                    return updatedHp;
                  });
                }
                return nextWords.filter((w) => w.y < 92);
              });
              loopRef.current = requestAnimationFrame(updatePosition);
            };

            loopRef.current = requestAnimationFrame(updatePosition);
            return () => cancelAnimationFrame(loopRef.current);
          }, [isPlaying, level]);

          const handleKeyDown = (e) => {
            if (e.key === 'Enter') {
              if (e.nativeEvent.isComposing) return;

              const trimmedInput = inputValue.trim();
              const isMatch = (wText) => (lang === 'EN' || lang === 'ES') 
                ? wText.toLowerCase() === trimmedInput.toLowerCase() 
                : wText === trimmedInput;

              const targetIndex = fallingWords.findIndex((w) => isMatch(w.text));

              if (targetIndex !== -1) {
                setFallingWords((prev) => prev.filter((_, idx) => idx !== targetIndex));
                setScore((prev) => prev + 10);
                setExp((prevExp) => {
                  let newExp = prevExp + 20;
                  if (newExp >= expToNextLevel) {
                    newExp -= expToNextLevel;
                    setLevel((lvl) => lvl + 1);
                  }
                  return newExp;
                });
              }
              setInputValue('');
            }
          };

          return (
            <div style={styles.container} ref={containerRef}>
              <div style={styles.header}>
                <div>Lv. {level}</div>
                <div style={styles.expBarContainer}>
                  <div style={{ ...styles.expBar, width: `${(exp / expToNextLevel) * 100}%` }} />
                </div>
                <div>HP: {'❤️'.repeat(hp)}</div>
                <div>Score: {score}</div>
                <button onClick={toggleFullscreen} style={styles.fullscreenBtn}>
                  {isFullscreen ? "📴 창화면" : "📺 전체화면"}
                </button>
              </div>

              <div style={styles.langTabs}>
                {['KO', 'EN', 'JA', 'ES'].map((l) => (
                  <button
                    key={l}
                    onClick={() => { if(!isLoading && countdown === null) { setLang(l); setIsPlaying(false); setFallingWords([]); } }}
                    style={{ ...styles.tabButton, backgroundColor: lang === l ? '#4A90E2' : '#E0E0E0' }}
                  >
                    {l}
                  </button>
                ))}
              </div>

              <div style={styles.gameArea}>
                {/* 카운트다운 오버레이 */}
                {countdown !== null && (
                  <div style={styles.centerOverlay}>
                    <div className="countdown-text">{countdown}</div>
                  </div>
                )}

                {/* 시작 대기 오버레이 */}
                {!isPlaying && countdown === null && (
                  <div style={styles.centerOverlay}>
                    <button onClick={startCountdownProcedure} disabled={isLoading} style={styles.startButton}>
                      {isLoading ? "라이브 어휘 수집 중..." : `${lang} 모드 시작`}
                    </button>
                  </div>
                )}
                
                {fallingWords.map((word) => (
                  <div key={word.id} style={{ ...styles.word, left: `${word.x}%`, top: `${word.y}%` }}>
                    <div style={styles.wordText}>{word.text}</div>
                  </div>
                ))}
              </div>

              <div style={styles.inputArea}>
                <input
                  type="text"
                  value={inputValue}
                  onChange={(e) => setInputValue(e.target.value)}
                  onKeyDown={handleKeyDown}
                  placeholder={isPlaying ? "단어를 입력하고 Enter!" : "대기 중..."}
                  disabled={!isPlaying}
                  style={styles.input}
                  autoFocus
                />
              </div>
            </div>
          );
        }

        const styles = {
          container: { display: 'flex', flexDirection: 'column', width: '100vw', height: '100dvh', fontFamily: 'sans-serif', overflow: 'hidden' },
          header: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 12px', backgroundColor: '#2C3E50', color: '#FFF', fontSize: '14px' },
          expBarContainer: { width: '25%', height: '8px', backgroundColor: '#34495E', borderRadius: '4px', overflow: 'hidden' },
          expBar: { height: '100%', backgroundColor: '#2ECC71', transition: 'width 0.2s ease' },
          fullscreenBtn: { border: 'none', backgroundColor: '#34495E', color: '#FFF', padding: '4px 8px', borderRadius: '4px', fontSize: '11px', cursor: 'pointer' },
          langTabs: { display: 'flex', justifyContent: 'space-around', padding: '10px', backgroundColor: '#FFF', borderBottom: '1px solid #E2E8F0' },
          tabButton: { padding: '8px 18px', border: 'none', borderRadius: '20px', color: '#FFF', fontWeight: 'bold', fontSize: '14px', cursor: 'pointer' },
          gameArea: { flex: 1, position: 'relative', backgroundColor: '#EDF2F7', overflow: 'hidden' },
          centerOverlay: { position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%, -50%)', zIndex: 10, textAlign: 'center' },
          startButton: { padding: '18px 45px', fontSize: '20px', backgroundColor: '#4A90E2', color: 'white', border: 'none', borderRadius: '50px', fontWeight: 'bold', boxShadow: '0 10px 20px rgba(74,144,226,0.4)', cursor: 'pointer' },
          word: { position: 'absolute', padding: '6px 14px', backgroundColor: '#FFF', border: '1px solid #CBD5E0', borderRadius: '20px', transform: 'translateX(-50%)', boxShadow: '0 4px 8px rgba(0,0,0,0.06)' },
          wordText: { fontSize: '16px', fontWeight: 'bold', color: '#2D3748', whiteSpace: 'nowrap' },
          inputArea: { padding: '15px', backgroundColor: '#FFF', borderTop: '1px solid #E2E8F0' },
          input: { width: '100%', padding: '14px', fontSize: '16px', borderRadius: '8px', border: '2px solid #CBD5E0', outline: 'none', textAlign: 'center', boxSizing: 'border-box' }
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LanguageRainGame />);
    </script>
</body>
</html>
