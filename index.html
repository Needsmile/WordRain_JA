<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>다국어 산성비 게임 Pro - 모바일 자판 완벽 재현 버전</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #F5F7FA; user-select: none; -webkit-user-select: none; }
        .ios-fullscreen { position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; z-index: 9999 !important; }
        @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1); opacity: 0; } }
        .countdown-text { font-size: 80px; font-weight: bold; color: #E74C3C; animation: pop 1s ease-in-out infinite; }
        @keyframes fadeUp { 0% { transform: translate(-50%, 0) scale(0.9); opacity: 1; } 100% { transform: translate(-50%, -25px) scale(1.1); opacity: 0; } }
        .ghost-text { position: absolute; font-size: 18px; font-weight: bold; color: #2ECC71; background-color: rgba(255, 255, 255, 0.95); padding: 4px 12px; border: 2px solid #2ECC71; border-radius: 15px; box-shadow: 0 4px 10px rgba(46,204,113,0.3); pointer-events: none; animation: fadeUp 1.2s forwards ease-out; white-space: nowrap; z-index: 8; }

        /* 스마트폰 스타일 가상 키보드 기본 프레임 */
        .virtual-keyboard { background-color: #D1D5DB; padding: 6px 4px 12px 4px; display: flex; flex-direction: column; gap: 6px; user-select: none; min-height: 180px; box-sizing: border-box; }
        .keyboard-row { display: flex; justify-content: center; gap: 4px; width: 100%; touch-action: manipulation; }
        .key-btn { flex: 1; height: 44px; background-color: #FFFFFF; border: none; border-radius: 5px; font-size: 16px; font-weight: 600; color: #1F2937; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 2px rgba(0,0,0,0.25); cursor: pointer; min-width: 0; }
        .key-btn:active { background-color: #9CA3AF; color: #FFF; }
        
        /* 특수 제어키 스타일 (스마트폰 회색/청색 계열 반영) */
        .key-btn.functional { background-color: #9CA3AF; color: #FFF; font-size: 14px; flex: 1.3; }
        .key-btn.shift-active { background-color: #4A90E2; color: #FFF; }
        .key-btn.enter { background-color: #4A90E2; color: #FFF; flex: 1.5; font-size: 14px; }
        .key-btn.space { flex: 4; background-color: #FFFFFF; }
    </style>
    <!-- Hangul.js 라이브러리: 천지인 조합을 브라우저에서 깔끔하게 처리하기 위해 도입 -->
    <script src="https://unpkg.com/hangul-js@0.2.6/hangul.min.js"></script>

</head>
<body>

    <script type="text/babel">

            {t:"amigo",m:"친구"},{t:"madre",m:"어머니"},{t:"padre",m:"아버지"},{t:"comida",m:"음식"},{t:"pan",m:"빵"},
            {t:"manzana",m:"사과"},{t:"platano",m:"바나나"},{t:"leche",m:"우유"},{t:"cafe",m:"커피"},{t:"te",m:"차"},
            {t:"queso",m:"치즈"},{t:"carne",m:"고기"},{t:"pescado",m:"생선"},{t:"arroz",m:"밥"},{t:"tiempo",m:"시간"},

            {t:"verde",m:"초록색"},{t:"blanco",m:"흰색"},{t:"negro",m:"검은색"},{t:"amarillo",m:"노란색"},{t:"grande",m:"큰"},
            {t:"pequeño",m:"작은"},{t:"feliz",m:"행복한"},{t:"triste",m:"슬픈"},{t:"nuevo",m:"새로운"},{t:"viejo",m:"오래된"},
            {t:"amor",m:"사랑"},{t:"paz",m:"평화"},{t:"escuela",m:"학교"},{t:"medico",m:"의사"},{t:"hospital",m:"병원"},
            {t:"ropa",m:"옷"},{t:"camisa",m:"셔츠"},{t:"pantalon",m:"바지"},{t:"zapato",m:"신발"},{t:"cuerpo",m:"몸"}
          ],
          JA: [
            {t:"いぬ",m:"개"},{t:"ねこ",m:"고양이"},{t:"とり",m:"새"},{t:"さかな",m:"물고기"},{t:"うさぎ",m:"토끼"},
            {t:"みず",m:"물"},{t:"おちゃ",m:"차"},{t:"ごはん",m:"밥"},{t:"ぱん",m:"빵"},{t:"にく",m:"고기"},
            {t:"りんご",m:"사과"},{t:"みかん",m:"귤"},{t:"すいか",m:"수박"},{t:"いちご",m:"딸기"},{t:"やさい",m:"채소"},
            {t:"いえ",m:"집"},{t:"まど",m:"창문"},{t:"ドア",m:"문"},{t:"つくえ",m:"책상"},{t:"いす",m:"의자"},

            {t:"くるま",m:"자동차"},{t:"でんしゃ",m:"지하철"},{t:"えき",m:"역"},{t:"うみ",m:"바다"},{t:"かわ",m:"강"},
            {t:"やま",m:"산"},{t:"そら",m:"하늘"},{t:"くも",m:"구름"},{t:"あめ",m:"비"},{t:"ゆき",m:"눈"},
            {t:"かぜ",m:"바람"},{t:"はな",m:"꽃"},{t:"き",m:"나무"},{t:"たいよう",m:"태양"},{t:"つき",m:"달"},
            {t:"ほし",m:"별"},{t:"あさ",m:"아침"},{t:"ひる",m:"낮"},{t:"よる",m:"밤"},{t:"きょう",m:"오늘"},

            {t:"なまえ",m:"이름"},{t:"おとこ",m:"남자"},{t:"おんな",m:"여자"},{t:"こども",m:"아이"},{t:"て",m:"손"}

        };

        // 천지인 자판용 자음 순차 변경 테이블맵 (ㄱ -> ㅋ -> ㄲ)
        const CHUNJIIN_MAP = {
          'ㄱ': ['ㄱ', 'ㅋ', 'ㄲ'], 'ㄴ': ['ㄴ', 'ㄹ'], 'ㄷ': ['ㄷ', 'ㅌ', 'ㄸ'],
          'ㅂ': ['ㅂ', 'ㅍ', 'ㅃ'], 'ㅅ': ['ㅅ', 'ㅆ'], 'ㅈ': ['ㅈ', 'ㅊ', 'ㅉ'],
          'ㅇ': ['ㅇ', 'ㅁ'], 'ㅎ': ['ㅎ', 'ㅍ']
        };

        function fisherYatesShuffle(array) {
          const result = [...array];
          for (let i = result.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [result[i], result[j]] = [result[j], result[i]];
          }
          return result;
        }

        function LanguageRainGame() {
          const [lang, setLang] = useState('KO');
          const [level, setLevel] = useState(1);
          const [score, setScore] = useState(0);
          const [clearCount, setClearCount] = useState(0); 
          const [isPlaying, setIsPlaying] = useState(false);
          const [countdown, setCountdown] = useState(null);
          const [isFullscreen, setIsFullscreen] = useState(false);
          const [fallingWords, setFallingWords] = useState([]);
          const [ghosts, setGhosts] = useState([]); 
          const [inputValue, setInputValue] = useState('');
          const [hp, setHp] = useState(5);

          // 영어/스페인어 대문자 제어 상태값
          const [isShiftActive, setIsShiftActive] = useState(false);
          // 한국어 천지인 내부 낱자 배열 버퍼
          const [koBuffer, setKoBuffer] = useState([]);
          const [lastChar, setLastChar] = useState('');

          const wordBufferRef = useRef([]);
          const loopRef = useRef(null);
          const spawnRef = useRef(null);

          const toggleFullscreen = () => { setIsFullscreen(!isFullscreen); };

          // 한국어 낱자 배열을 조합해서 실제 글자로 표현하는 유틸
          useEffect(() => {
            if (lang === 'KO') {
              setInputValue(Hangul.assemble(koBuffer));
            }
          }, [koBuffer, lang]);

          const loadEmbeddedWords = (targetLang) => {
            if (targetLang === 'KO') {
              const sampleKo = ['우주', '바다', '고래', '태양', '하늘', '나무', '새', '달빛', '행복', '미소', '은하수', '꽃', '강물', '지구', '의자', '가방', '고양이', '사과'];
              return fisherYatesShuffle(sampleKo.map(w => ({ text: w, meaning: w })));
            }
            const rawData = MASTER_WORDS[targetLang] || MASTER_WORDS['EN'];
            return fisherYatesShuffle(rawData.map(item => ({ text: item.t, meaning: item.m })));
          };

          const startCountdownProcedure = () => {
            const fetched = loadEmbeddedWords(lang);
            setIsPlaying(false);
            setFallingWords([]);
            setGhosts([]);
            setScore(0);
            setClearCount(0);
            setHp(5);
            setInputValue('');
            setKoBuffer([]);
            setLastChar('');
            
            wordBufferRef.current = fetched;
            let count = 3;
            setCountdown(count);

            const timer = setInterval(() => {
              count -= 1;
              if (count === 0) {
                setCountdown('START!');
              } else if (count < 0) {
                clearInterval(timer);
                setCountdown(null);
                setIsPlaying(true);
              } else {
                setCountdown(count);
              }
            }, 1000);
          };

          const gameOver = () => {
            setIsPlaying(false);
            alert(`게임 오버! 최종 점수: ${score}`);
          };

          useEffect(() => {
            if (!isPlaying) return;
            const spawnWord = () => {
              if (wordBufferRef.current.length === 0) {
                wordBufferRef.current = loadEmbeddedWords(lang);
              }
              const nextItem = wordBufferRef.current.shift();
              if(!nextItem) return;

              const randomX = Math.floor(Math.random() * 60) + 20;
              setFallingWords((prev) => [
                ...prev,
                { id: Date.now() + Math.random(), text: nextItem.text, meaning: nextItem.meaning, x: randomX, y: 0 }
              ]);
            };
            spawnRef.current = setInterval(spawnWord, 2000);
            return () => clearInterval(spawnRef.current);
          }, [isPlaying, lang]);

          useEffect(() => {
            if (!isPlaying) return;
            const updatePosition = () => {
              setFallingWords((prev) => {
                const nextWords = prev.map((w) => ({ ...w, y: w.y + (0.08 + level * 0.02) }));
                const escaped = nextWords.filter((w) => w.y >= 90);
                if (escaped.length > 0) {
                  setHp((currHp) => {
                    const updatedHp = currHp - escaped.length;
                    if (updatedHp <= 0) { gameOver(); return 0; }
                    return updatedHp;
                  });
                }
                return nextWords.filter((w) => w.y < 90);
              });
              loopRef.current = requestAnimationFrame(updatePosition);
            };
            loopRef.current = requestAnimationFrame(updatePosition);
            return () => cancelAnimationFrame(loopRef.current);
          }, [isPlaying, level]);

          // 스마트폰식 자판 통합 입력 핸들러
          const handleSmartKeyPress = (key) => {
            if (!isPlaying) return;

            // 1. 공통 기능 키 제어
            if (key === 'Delete') {
              if (lang === 'KO') {
                if (koBuffer.length > 0) {
                  setKoBuffer(prev => prev.slice(0, -1));
                  setLastChar('');
                }
              } else {
                setInputValue(prev => prev.slice(0, -1));
              }
              return;
            }

            if (key === 'Enter') {
              const trimmedInput = inputValue.trim();
              const isMatch = (wText) => (lang === 'EN' || lang === 'ES') ? wText.toLowerCase() === trimmedInput.toLowerCase() : wText === trimmedInput;
              const targetIndex = fallingWords.findIndex((w) => isMatch(w.text));

              if (targetIndex !== -1) {
                const matchedWord = fallingWords[targetIndex];
                if (lang !== 'KO') {
                  const ghostId = Date.now() + Math.random();
                  setGhosts((prev) => [...prev, { id: ghostId, text: matchedWord.meaning, x: matchedWord.x, y: matchedWord.y }]);
                  setTimeout(() => { setGhosts((prev) => prev.filter(g => g.id !== ghostId)); }, 1200);
                }
                setFallingWords((prev) => prev.filter((_, idx) => idx !== targetIndex));
                setScore((prev) => prev + 10);
                const nextCount = clearCount + 1;
                setClearCount(nextCount);

                if (nextCount >= 20) {
                  setIsPlaying(false);
                  alert("🎉 오늘 목표 미션 클리어!");
                  setInputValue('');
                  setKoBuffer([]);
                  return;
                }
              }
              setInputValue('');
              setKoBuffer([]);
              setLastChar('');
              return;
            }

            if (key === 'Shift') {
              setIsShiftActive(!isShiftActive);
              return;
            }

            // 2. 언어별 입력 가공 처리
            if (lang === 'EN' || lang === 'ES') {
              const charToAppend = isShiftActive ? key.toUpperCase() : key.toLowerCase();
              setInputValue(prev => prev + charToAppend);
              setIsShiftActive(false); // 스마트폰처럼 한 자 입력 후 해제
            } 
            else if (lang === 'JA') {
              setInputValue(prev => prev + key);
            } 
            else if (lang === 'KO') {
              // 천지인 자판 핵심 연산 로직
              if (key === 'ㆍ' || key === 'ㅡ' || key === 'ㅣ') {
                let mappedVowel = key === 'ㆍ' ? 'ㅏ' : (key === 'ㅡ' ? 'ㅡ' : 'ㅣ');
                setKoBuffer(prev => [...prev, mappedVowel]);
                setLastChar(key);
              } else if (key === '간격') {
                // 천지인 연속 자음 입력을 끊어주기 위한 간격 버튼 기능
                setLastChar('');
              } else {
                // 자음 연속 터치 시 변형 처리 (ㄱ -> ㅋ -> ㄲ)
                if (lastChar === key && CHUNJIIN_MAP[key]) {
                  setKoBuffer(prev => {
                    const next = [...prev];
                    next.pop(); // 직전 입력 제거 후 교체
                    const cycle = CHUNJIIN_MAP[key];
                    const currIdx = cycle.indexOf(next[next.length - 1] || key);
                    const nextIdx = (currIdx + 1) % cycle.length;
                    return [...next, cycle[nextIdx]];
                  });
                } else {
                  setKoBuffer(prev => [...prev, key]);
                  setLastChar(key);
                }
              }
            }
          };

          // 📱 모바일 스마트폰 환경을 이식한 자판 레이아웃 렌더러
          const renderSmartKeyboard = () => {
            if (lang === 'EN' || lang === 'ES') {
              const row1 = ['Q', 'W', 'E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P'];
              const row2 = lang === 'ES' ? ['A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L', 'Ñ'] : ['A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L'];
              const row3 = ['Z', 'X', 'C', 'V', 'B', 'N', 'M'];

              return (
                <div class="virtual-keyboard">
                  <div class="keyboard-row">
                    {row1.map(k => <button key={k} class="key-btn" onClick={() => handleSmartKeyPress(k)}>{isShiftActive ? k : k.toLowerCase()}</button>)}
                  </div>
                  <div class="keyboard-row">
                    {row2.map(k => <button key={k} class="key-btn" onClick={() => handleSmartKeyPress(k)}>{isShiftActive ? k : k.toLowerCase()}</button>)}
                  </div>
                  <div class="keyboard-row">
                    <button class={`key-btn functional ${isShiftActive ? 'shift-active' : ''}`} onClick={() => handleSmartKeyPress('Shift')}>⇧</button>
                    {row3.map(k => <button key={k} class="key-btn" onClick={() => handleSmartKeyPress(k)}>{isShiftActive ? k : k.toLowerCase()}</button>)}
                    <button class="key-btn functional" onClick={() => handleSmartKeyPress('Delete')}>⌫</button>
                  </div>
                  <div class="keyboard-row">
                    <button class="key-btn enter" onClick={() => handleSmartKeyPress('Enter')}>Enter</button>
                  </div>
                </div>
              );
            }

            if (lang === 'KO') {
              // 대한민국 스마트폰 표준 [천지인 기본 자판] 구성
              return (
                <div class="virtual-keyboard">
                  <div class="keyboard-row">
                    <button class="key-btn" onClick={() => handleSmartKeyPress('ㄱ')}>ㄱㅋ</button>
                    <button class="key-btn" onClick={() => handleSmartKeyPress('ㆍ')}>ㆍ</button>
                    <button class="key-btn" onClick={() => handleSmartKeyPress('ㄴ')}>ㄴㄹ</button>
                  </div>
                  <div class="keyboard-row">
                    <button class="key-btn" onClick={() => handleSmartKeyPress('ㄷ')}>ㄷㅌ</button>
                    <button class="key-btn" onClick={() => handleSmartKeyPress('ㅡ')}>ㅡ</button>
                    <button class="key-btn" onClick={() => handleSmartKeyPress('ㅂ')}>ㅂㅍ</button>
                  </div>
                  <div class="keyboard-row">
                    <button class="key-btn" onClick={() => handleSmartKeyPress('ㅅ')}>ㅅㅆ</button>
                    <button class="key-btn" onClick={() => handleSmartKeyPress('ㅣ')}>ㅣ</button>
                    <button class="key-btn" onClick={() => handleSmartKeyPress('ㅈ')}>ㅈㅊ</button>
                  </div>
                  <div class="keyboard-row">
                    <button class="key-btn functional" onClick={() => handleSmartKeyPress('간격')}>간격</button>
                    <button class="key-btn" onClick={() => handleSmartKeyPress('ㅇ')}>ㅇㅁ</button>
                    <button class="key-btn functional" onClick={() => handleSmartKeyPress('Delete')}>⌫</button>
                    <button class="key-btn enter" onClick={() => handleSmartKeyPress('Enter')}>Enter</button>
                  </div>
                </div>
              );
            }

            if (lang === 'JA') {
              // 모바일 일본어 입력의 표준인 5음도 행 압축 배열 패드 적용
              const rows = [
                ['あ', 'か', 'さ', 'た'],
                ['な', 'は', 'ま', 'や'],
                ['ら', 'わ', 'ん', 'っ']
              ];
              return (
                <div class="virtual-keyboard">
                  {rows.map((row, idx) => (
                    <div key={idx} class="keyboard-row">
                      {row.map(k => <button key={k} class="key-btn" onClick={() => handleSmartKeyPress(k)}>{k}</button>)}
                    </div>
                  ))}
                  <div class="keyboard-row">
                    <button class="key-btn functional" onClick={() => handleSmartKeyPress('Delete')}>⌫</button>
                    <button class="key-btn enter" onClick={() => handleSmartKeyPress('Enter')}>Enter</button>
                  </div>
                </div>
              );
            }
          };

          return (
            <div style={styles.container} class={isFullscreen ? "ios-fullscreen" : ""}>
              <div style={styles.header}>
                <div>Lv. {level}</div>
                <div style={styles.targetProgress}>🎯 Daily: {clearCount} / 20</div>
                <div>HP: {'❤️'.repeat(hp)}</div>
                <div>Score: {score}</div>
                <button onClick={toggleFullscreen} style={styles.fullscreenBtn}>{isFullscreen ? "📴 창화면" : "📺 전체화면"}</button>
              </div>

              <div style={styles.langTabs}>
                {['KO', 'EN', 'JA', 'ES'].map((l) => (
                  <button key={l} onClick={() => { if(countdown === null) { setLang(l); setIsPlaying(false); setFallingWords([]); setGhosts([]); setInputValue(''); setKoBuffer([]); } }} style={{ ...styles.tabButton, backgroundColor: lang === l ? '#4A90E2' : '#E0E0E0' }}>{l}</button>
                ))}
              </div>

              <div style={styles.displayBar}>
                <span style={styles.labelText}>입력창 : </span>
                <span style={styles.displayValue}>{inputValue || "아래 자판을 터치하세요"}</span>
              </div>

              <div style={styles.gameArea}>
                {ghosts.map((ghost) => ( <div key={ghost.id} class="ghost-text" style={{ left: `${ghost.x}%`, top: `${ghost.y}%` }}>{ghost.text}</div> ))}
                {countdown !== null && ( <div style={styles.centerOverlay}><div class="countdown-text">{countdown}</div></div> )}
                {!isPlaying && countdown === null && (
                  <div style={styles.centerOverlay}><button onClick={startCountdownProcedure} style={styles.startButton}>{lang} Daily 시작</button></div>
                )}
                {fallingWords.map((word) => ( <div key={word.id} style={{ ...styles.word, left: `${word.x}%`, top: `${word.y}%` }}><div style={styles.wordText}>{word.text}</div></div> ))}
              </div>

              {renderSmartKeyboard()}
            </div>
          );
        }

        const styles = {
          container: { display: 'flex', flexDirection: 'column', width: '100vw', height: '100dvh', fontFamily: 'sans-serif', overflow: 'hidden', backgroundColor: '#F5F7FA' },
          header: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 12px', backgroundColor: '#2C3E50', color: '#FFF', fontSize: '14px', zIndex: 5 },
          targetProgress: { fontWeight: 'bold', color: '#F1C40F' },
          fullscreenBtn: { border: 'none', backgroundColor: '#34495E', color: '#FFF', padding: '4px 8px', borderRadius: '4px', fontSize: '11px' },
          langTabs: { display: 'flex', justifyContent: 'space-around', padding: '10px', backgroundColor: '#FFF', borderBottom: '1px solid #E2E8F0', zIndex: 5 },
          tabButton: { padding: '8px 18px', border: 'none', borderRadius: '20px', color: '#FFF', fontWeight: 'bold', fontSize: '14px' },
          displayBar: { backgroundColor: '#FFFFFF', padding: '12px', textAlign: 'center', borderBottom: '2px solid #E2E8F0', fontSize: '18px', fontWeight: 'bold' },
          labelText: { color: '#718096', marginRight: '8px' },
          displayValue: { color: '#4A90E2', borderBottom: '2px solid #4A90E2', padding: '0 8px', minWidth: '150px', display: 'inline-block' },
          gameArea: { flex: 1, position: 'relative', backgroundColor: '#EBF8FF', overflow: 'hidden' },
          centerOverlay: { position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%, -50%)', zIndex: 10, textAlign: 'center' },
          startButton: { padding: '14px 40px', fontSize: '18px', backgroundColor: '#4A90E2', color: 'white', border: 'none', borderRadius: '50px', fontWeight: 'bold', boxShadow: '0 6px 15px rgba(74,144,226,0.3)' },
          word: { position: 'absolute', padding: '6px 14px', backgroundColor: '#FFF', border: '2px solid #4A90E2', borderRadius: '20px', transform: 'translateX(-50%)', boxShadow: '0 4px 8px rgba(0,0,0,0.08)' },
          wordText: { fontSize: '15px', fontWeight: 'bold', color: '#2D3748', whiteSpace: 'nowrap' }
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LanguageRainGame/>);
    </script>
</body>
</html>
